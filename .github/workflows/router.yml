name: Deploy Domain Router

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/router/**'
      - '.github/workflows/router.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-router
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infrastructure/router/package-lock.json

      - name: Install
        run: npm ci
        working-directory: infrastructure/router

      # Deploys `cooktwo-domain-router` — the front door for both
      # cooktwo.com and cooktwo.app (reverse-proxies to the Pages projects).
      - name: Deploy Worker
        run: npx wrangler@latest deploy
        working-directory: infrastructure/router
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
