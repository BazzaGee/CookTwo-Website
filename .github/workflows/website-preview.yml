name: Preview Website (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/website-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-website-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        run: |
          BRANCH_NAME="${{ github.event.pull_request.head.ref || github.ref_name }}"
          BRANCH_SLUG=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          if [ -z "$BRANCH_SLUG" ]; then
            BRANCH_SLUG="pr-${{ github.event.pull_request.number || 'manual' }}"
          fi
          echo "branch-slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          npx wrangler@latest pages deploy dist \
            --project-name=couples-food-system-v3 \
            --branch="$BRANCH_SLUG"
        working-directory: website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outputs.branch-slug
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cooktwo-preview
          message: |
            ✅ Preview deployed.
            - Branch: `${{ steps.deploy.outputs.branch-slug }}`
            - URL: https://${{ steps.deploy.outputs.branch-slug }}.couples-food-system-v3.pages.dev
            - Approve with `/approve` to promote to `main` (auto-publish on the next eligible cadence).
            - Request changes with comments on this PR; the workflow will pick them up and update this same preview.
